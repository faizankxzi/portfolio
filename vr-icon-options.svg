<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">VR icon options</title>
  <desc id="desc">A grid of six orange VR goggle icon options on light cards.</desc>
  <rect width="1200" height="820" fill="#f4efe7"/>
  <style>
    .card { fill: #fff8f1; stroke: #d8c6b3; stroke-width: 2; rx: 28; }
    .label { font: 700 28px Manrope, Arial, sans-serif; fill: #5f5249; }
    .hint { font: 500 18px Manrope, Arial, sans-serif; fill: #8c7d72; }
    .icon { fill: none; stroke: #f08a24; stroke-width: 10; stroke-linecap: round; stroke-linejoin: round; }
    .solid { fill: #f08a24; stroke: none; }
  </style>

  <g transform="translate(60 50)">
