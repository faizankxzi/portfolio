<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Park Sphere logo</title>
  <desc id="desc">A clean vector remake of the Park Sphere logo with a circular outline, horizontal divider, and yellow accent sphere.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a6df0"/>
      <stop offset="100%" stop-color="#9a7cf5"/>
    </linearGradient>
    <radialGradient id="sun" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#fff38c"/>
      <stop offset="100%" stop-color="#e0c900"/>
    </radialGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#6c54c7" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1200" height="1200" rx="220" fill="url(#bg)"/>

  <circle cx="600" cy="580" r="430" fill="none" stroke="rgba(255,255,255,0.72)" stroke-width="9"/>
  <line x1="160" y1="590" x2="1040" y2="590" stroke="rgba(255,255,255,0.82)" stroke-width="11" stroke-linecap="round"/>

  <circle cx="300" cy="170" r="78" fill="url(#sun)" filter="url(#soft-shadow)"/>

  <text x="600" y="500" text-anchor="middle" fill="#ffffff" font-family="Manrope, Arial, sans-serif" font-size="118" font-weight="800" letter-spacing="3">
    Park Sphere
  </text>

  <text x="600" y="690" text-anchor="middle" fill="rgba(255,255,255,0.88)" font-family="Manrope, Arial, sans-serif" font-size="58" font-weight="600">
    we’ll look after your ride!
  </text>
</svg>
